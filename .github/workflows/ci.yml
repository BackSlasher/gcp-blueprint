name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check workflow YAML syntax
        run: python3 -c "import yaml, sys; yaml.safe_load(open(sys.argv[1]))" .github/workflows/deploy.yml

      - name: Install actionlint
        run: |
          curl -sL "$(curl -s https://api.github.com/repos/rhysd/actionlint/releases/latest \
            | jq -r '.assets[] | select(.name | test("linux_amd64.tar.gz$")) | .browser_download_url')" \
            | tar xz -C /usr/local/bin actionlint

      - name: Lint workflows
        run: actionlint
