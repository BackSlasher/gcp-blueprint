name: Deploy to GCP

on:
  workflow_call:
    inputs:
      gcp_project_id:
        description: "GCP project ID (the string identifier, not the number)"
        required: true
        type: string
      deploy_dir:
        description: "Path to the deploy directory containing terraform/ and helm/ subdirectories"
        required: false
        type: string
        default: "deploy"
      workload_identity_provider:
        description: "Full resource name of the GCP Workload Identity Provider for GitHub OIDC"
        required: true
        type: string
      service_account:
        description: "GCP service account email to impersonate via OIDC"
        required: true
        type: string
      helm_release_name:
        description: "Helm release name"
        required: false
        type: string
        default: "app"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4

      - name: Checkout blueprint repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.action_repository }}
          ref: ${{ github.action_ref }}
          path: .blueprint

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ inputs.workload_identity_provider }}
          service_account: ${{ inputs.service_account }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Resolve project number and bucket name
        id: project
        run: |
          PROJECT_NUMBER=$(gcloud projects describe "${{ inputs.gcp_project_id }}" --format='value(projectNumber)')
          BUCKET_NAME="blueprint-tfstate-${PROJECT_NUMBER}"
          echo "number=${PROJECT_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "bucket_name=${BUCKET_NAME}" >> "$GITHUB_OUTPUT"

      - name: Bootstrap Terraform state bucket
        working-directory: .blueprint/modules/state-bucket
        run: |
          terraform init
          terraform apply -auto-approve \
            -var="project_id=${{ inputs.gcp_project_id }}" \
            2>&1 | tee /tmp/tf-bootstrap.log || {
            if grep -q "googleapi: Error 409" /tmp/tf-bootstrap.log; then
              echo "State bucket already exists, continuing."
            else
              exit 1
            fi
          }

      - name: Check expected Terraform outputs
        working-directory: ${{ inputs.deploy_dir }}/terraform
        run: |
          if ! grep -rq 'output.*"gke_cluster_name"' . ; then
            echo "::error::Missing required Terraform output: gke_cluster_name"
            exit 1
          fi
          if ! grep -rq 'output.*"gke_cluster_location"' . ; then
            echo "::error::Missing required Terraform output: gke_cluster_location"
            exit 1
          fi

      - name: Terraform Init
        working-directory: ${{ inputs.deploy_dir }}/terraform
        run: |
          terraform init \
            -backend-config="bucket=${{ steps.project.outputs.bucket_name }}"

      - name: Terraform Apply
        working-directory: ${{ inputs.deploy_dir }}/terraform
        run: terraform apply -auto-approve

      - name: Configure kubectl from Terraform outputs
        working-directory: ${{ inputs.deploy_dir }}/terraform
        run: |
          CLUSTER_NAME=$(terraform output -raw gke_cluster_name)
          CLUSTER_LOCATION=$(terraform output -raw gke_cluster_location)
          gcloud container clusters get-credentials "$CLUSTER_NAME" \
            --location="$CLUSTER_LOCATION" \
            --project="${{ inputs.gcp_project_id }}"

      - name: Helm deploy
        run: |
          helm upgrade --install "${{ inputs.helm_release_name }}" \
            "./${{ inputs.deploy_dir }}/helm" \
            --wait
