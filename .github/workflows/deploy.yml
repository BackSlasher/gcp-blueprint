name: Deploy to GCP

on:
  workflow_call:
    inputs:
      gcp_project_id:
        description: "GCP project ID (the string identifier, e.g. 'my-project')"
        required: true
        type: string
      gcp_project_number:
        description: "GCP project number (numeric, e.g. '1234567890')"
        required: true
        type: string
      deploy_dir:
        description: "Path to the deploy directory containing the Pulumi project"
        required: false
        type: string
        default: "deploy"
      pulumi_stack:
        description: "Pulumi stack name"
        required: false
        type: string
        default: "prod"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    env:
      WIF_PROVIDER: projects/${{ inputs.gcp_project_number }}/locations/global/workloadIdentityPools/github/providers/github-actions
      SERVICE_ACCOUNT: github-deploy@${{ inputs.gcp_project_id }}.iam.gserviceaccount.com
      BUCKET_NAME: blueprint-state-${{ inputs.gcp_project_number }}

    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Install Pulumi CLI
        uses: pulumi/actions@v6
        with:
          command: version

      - name: Detect runtime and install dependencies
        working-directory: ${{ inputs.deploy_dir }}
        run: |
          RUNTIME=$(python3 -c "import yaml, sys; print(yaml.safe_load(open('Pulumi.yaml'))['runtime'])")
          echo "Detected Pulumi runtime: ${RUNTIME}"

          case "${RUNTIME}" in
            nodejs)
              if [ -f package-lock.json ]; then
                npm ci
              elif [ -f yarn.lock ]; then
                yarn install --frozen-lockfile
              else
                npm install
              fi
              ;;
            python)
              python3 -m venv venv
              source venv/bin/activate
              pip install -r requirements.txt
              ;;
            go)
              go mod download
              ;;
            *)
              echo "::error::Unsupported Pulumi runtime: ${RUNTIME}"
              exit 1
              ;;
          esac

      - name: Pulumi login to GCS backend
        run: pulumi login "gs://${BUCKET_NAME}"

      - name: Pulumi stack select
        working-directory: ${{ inputs.deploy_dir }}
        run: pulumi stack select --create "${{ inputs.pulumi_stack }}"

      - name: Pulumi up
        working-directory: ${{ inputs.deploy_dir }}
        run: pulumi up --yes
        env:
          PULUMI_CONFIG_PASSPHRASE: ""
