name: Deploy to GCP

on:
  workflow_call:
    inputs:
      gcp_project_id:
        description: "GCP project ID (the string identifier, not the number)"
        required: true
        type: string
      workload_identity_provider:
        description: "Full resource name of the GCP Workload Identity Provider for GitHub OIDC"
        required: true
        type: string
      service_account:
        description: "GCP service account email to impersonate via OIDC"
        required: true
        type: string
      deploy_dir:
        description: "Path to the deploy directory containing the Pulumi project"
        required: false
        type: string
        default: "deploy"
      pulumi_stack:
        description: "Pulumi stack name"
        required: false
        type: string
        default: "prod"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout caller repo
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ inputs.workload_identity_provider }}
          service_account: ${{ inputs.service_account }}

      - name: Resolve project number
        id: project
        run: |
          PROJECT_NUMBER=$(gcloud projects describe "${{ inputs.gcp_project_id }}" --format='value(projectNumber)')
          echo "number=${PROJECT_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "bucket_name=blueprint-state-${PROJECT_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Install Pulumi CLI
        uses: pulumi/actions@v6
        with:
          command: version

      - name: Detect runtime and install dependencies
        working-directory: ${{ inputs.deploy_dir }}
        run: |
          RUNTIME=$(python3 -c "import yaml, sys; print(yaml.safe_load(open('Pulumi.yaml'))['runtime'])")
          echo "Detected Pulumi runtime: ${RUNTIME}"

          case "${RUNTIME}" in
            nodejs)
              if [ -f package-lock.json ]; then
                npm ci
              elif [ -f yarn.lock ]; then
                yarn install --frozen-lockfile
              else
                npm install
              fi
              ;;
            python)
              python3 -m venv venv
              source venv/bin/activate
              pip install -r requirements.txt
              ;;
            go)
              go mod download
              ;;
            *)
              echo "::error::Unsupported Pulumi runtime: ${RUNTIME}"
              exit 1
              ;;
          esac

      - name: Pulumi login to GCS backend
        run: pulumi login "gs://${{ steps.project.outputs.bucket_name }}"

      - name: Pulumi stack select
        working-directory: ${{ inputs.deploy_dir }}
        run: pulumi stack select --create "${{ inputs.pulumi_stack }}"

      - name: Pulumi up
        working-directory: ${{ inputs.deploy_dir }}
        run: pulumi up --yes
        env:
          PULUMI_CONFIG_PASSPHRASE: ""
